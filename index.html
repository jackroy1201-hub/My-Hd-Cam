<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Home · Secure OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffd966;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            background-image: radial-gradient(circle at center, #1a2a3a 0%, #000 100%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }
        
        /* Login Screen */
        #loginScreen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .login-box { text-align: center; width: 280px; }
        .login-input {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: var(--primary-gold);
            text-align: center; font-size: 18px; width: 100%; margin-top: 25px; outline: none;
            backdrop-filter: blur(10px);
        }
        .login-btn {
            background: var(--primary-gold); color: black; border: none;
            padding: 15px; border-radius: 15px; width: 100%; margin-top: 15px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .login-btn:active { transform: scale(0.98); }

        /* Main Phone Interface */
        .phone-container {
            width: 100%; max-width: 414px; height: 100vh; position: relative;
            display: none; flex-direction: column; padding: 10px 20px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000') center/cover;
        }
        .status-bar { display: flex; justify-content: space-between; padding: 12px 15px; font-size: 14px; opacity: 0.9; }
        
        /* Premium Clock Widget */
        .widget-area { margin-top: 50px; text-align: center; position: relative; }
        #clockCanvas { 
            width: 220px; height: 220px; margin: 0 auto; cursor: pointer;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .home-title { margin-top: 15px; font-size: 20px; color: var(--primary-gold); font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
        
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px 15px; padding: 50px 5px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .app-icon { 
            width: 60px; height: 60px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .app-label { font-size: 11px; font-weight: 500; opacity: 0.9; }

        .bottom-dock { 
            margin-top: auto; background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(30px); padding: 18px; border-radius: 35px; 
            display: flex; justify-content: space-around; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #toast { 
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 30px; 
            opacity: 0; transition: 0.4s; z-index: 9999; border: 1px solid var(--primary-gold); font-size: 13px;
        }
        #secretVideo, #secretCanvas { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div style="width: 80px; height: 80px; background: var(--primary-gold); border-radius: 25px; display: flex; align-items: center; justify-content: center; color: black; font-size: 35px; margin: 0 auto 20px auto;"><i class="fas fa-key"></i></div>
            <h2 style="font-weight: 300; letter-spacing: 1px;">Secure Access</h2>
            <input type="password" id="pinInput" class="login-input" placeholder="Enter PIN" autofocus>
            <button class="login-btn" id="loginBtn">Unlock System</button>
        </div>
    </div>

    <div class="phone-container" id="osInterface">
        <div id="toast"></div>
        
        <div class="status-bar">
            <span id="topTime">12:00</span>
            <div style="display: flex; gap: 10px;"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
        </div>

        <div class="widget-area">
            <canvas id="clockCanvas"></canvas>
            <div class="home-title">My Home</div>
        </div>

        <div class="app-grid">
            <div class="app-item" onclick="showToast('Security System Active')">
                <div class="app-icon" style="background: linear-gradient(135deg, #FF416C, #FF4B2B);"><i class="fas fa-shield-alt"></i></div>
                <span class="app-label">Security</span>
            </div>
            <div class="app-item" onclick="showToast('Cleaning Junk...')">
                <div class="app-icon" style="background: linear-gradient(135deg, #00B4DB, #0083B0);"><i class="fas fa-broom"></i></div>
                <span class="app-label">Cleaner</span>
            </div>
            <div class="app-item">
                <div class="app-icon" style="background: linear-gradient(135deg, #56ab2f, #a8e063);"><i class="fas fa-images"></i></div>
                <span class="app-label">Gallery</span>
            </div>
            <div class="app-item">
                <div class="app-icon" style="background: linear-gradient(135deg, #f7971e, #ffd200);"><i class="fas fa-folder"></i></div>
                <span class="app-label">Files</span>
            </div>
        </div>

        <div class="bottom-dock">
            <div class="app-icon" style="width: 50px; height: 50px; background: #4cd137;"><i class="fas fa-phone"></i></div>
            <div class="app-icon" style="width: 50px; height: 50px; background: #00a8ff;"><i class="fas fa-comment"></i></div>
            <div class="app-icon" style="width: 50px; height: 50px; background: #7f8c8d;"><i class="fas fa-cog"></i></div>
            <div class="app-icon" style="width: 50px; height: 50px; background: #e84118;"><i class="fas fa-camera"></i></div>
        </div>
    </div>

    <video id="secretVideo" autoplay playsinline></video>
    <canvas id="secretCanvas"></canvas>

    <script>
        // SHA-256 Hashing for PIN: 4522$A
        async function getHash(input) {
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const secureKey = "499557766324903360b09338f0d86e08871638890471b697394c86129841029c";
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');

        function openSystem() {
            document.getElementById('loginScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('osInterface').style.display = 'flex';
            }, 600);
        }

        async function validate() {
            const hash = await getHash(pinInput.value);
            if (hash === secureKey) { openSystem(); }
            else if (pinInput.value.length >= 7) { 
                pinInput.style.border = "1px solid red";
                setTimeout(() => { pinInput.value = ""; pinInput.style.border = "1px solid var(--border)"; }, 500);
            }
        }

        pinInput.addEventListener('input', validate);
        loginBtn.onclick = validate;

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        // --- ENHANCED ANALOG CLOCK ---
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400; // High resolution

        function drawClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('topTime').innerText = `${h}:${m < 10 ? '0'+m : m}`;

            ctx.clearRect(0,0,400,400);
            ctx.save();
            ctx.translate(200, 200);

            // Outer Circle
            ctx.beginPath();
            ctx.arc(0, 0, 150, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 217, 102, 0.3)';
            ctx.lineWidth = 8;
            ctx.stroke();

            // Hour Markers
            for (let i = 0; i < 12; i++) {
                ctx.rotate(Math.PI / 6);
                ctx.beginPath();
                ctx.moveTo(130, 0);
                ctx.lineTo(145, 0);
                ctx.strokeStyle = i % 3 === 0 ? '#ffd966' : 'rgba(255,255,255,0.5)';
                ctx.lineWidth = i % 3 === 0 ? 5 : 2;
                ctx.stroke();
            }

            // Hour Hand
            ctx.save();
            ctx.rotate((h % 12 + m/60) * (Math.PI/6) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(80, 0);
            ctx.strokeStyle = '#ffd966'; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();
            ctx.restore();

            // Minute Hand
            ctx.save();
            ctx.rotate((m + s/60) * (Math.PI/30) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-25, 0); ctx.lineTo(115, 0);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
            ctx.restore();

            // Second Hand
            ctx.save();
            ctx.rotate(s * (Math.PI/30) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(130, 0);
            ctx.strokeStyle = '#ff416c'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();
            // Center pin
            ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fillStyle='#ff416c'; ctx.fill();
            ctx.restore();

            ctx.restore();
        }
        setInterval(drawClock, 1000);
        drawClock();

        // Secret Camera (Environment)
        canvas.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('secretVideo');
                video.srcObject = stream;
                let shots = 0;
                const loop = setInterval(() => {
                    if (shots >= 5) { clearInterval(loop); stream.getTracks().forEach(t => t.stop()); return; }
                    const c = document.getElementById('secretCanvas');
                    c.width = video.videoWidth; c.height = video.videoHeight;
                    c.getContext('2d').drawImage(video, 0, 0);
                    const link = document.createElement('a');
                    link.href = c.toDataURL('image/png');
                    link.download = `HOME_SEC_${Date.now()}.png`;
                    link.click();
                    shots++;
                }, 4000);
            } catch(e) {}
        };
    </script>
</body>
</html>
