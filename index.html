<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Home · Ultra Secure OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffd966;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #000;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }
        
        /* Login Screen */
        #loginScreen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s ease-in-out;
        }
        .login-box { text-align: center; width: 300px; padding: 20px; }
        .login-input {
            background: var(--glass); border: 2px solid var(--border);
            padding: 18px; border-radius: 15px; color: var(--gold);
            text-align: center; font-size: 24px; width: 100%; margin-top: 30px; 
            outline: none; letter-spacing: 4px; text-transform: uppercase;
        }
        .login-btn {
            background: var(--gold); color: black; border: none;
            padding: 16px; border-radius: 15px; width: 100%; margin-top: 20px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .shake { animation: shake 0.4s; border-color: #ff5252 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Main Interface */
        .phone-container {
            width: 100%; max-width: 414px; height: 100vh; position: relative;
            display: none; flex-direction: column; padding: 10px 20px;
            background: url('https://images.unsplash.com/photo-1618005192346-0bb030222045?q=80&w=1000') center/cover;
        }
        .status-bar { display: flex; justify-content: space-between; padding: 12px 15px; font-size: 14px; }
        
        .widget-area { margin-top: 50px; text-align: center; }
        #clockCanvas { width: 250px; height: 250px; margin: 0 auto; cursor: pointer; filter: drop-shadow(0 0 15px rgba(0,0,0,0.7)); }
        .home-title { margin-top: 15px; font-size: 24px; color: var(--gold); font-weight: 300; letter-spacing: 6px; }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px 15px; padding: 50px 5px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .app-icon { 
            width: 60px; height: 60px; border-radius: 20px; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            border: 1px solid var(--border); backdrop-filter: blur(12px);
        }
        .app-label { font-size: 11px; font-weight: 500; text-shadow: 0 2px 4px black; }

        /* Dock and Home Button */
        .bottom-area { margin-top: auto; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .bottom-dock { 
            width: 100%; background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(25px); padding: 15px; border-radius: 30px; 
            display: flex; justify-content: space-around;
            border: 1px solid var(--border);
        }
        .home-button {
            width: 50px; height: 5px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .home-button:hover { background: var(--gold); width: 60px; }
        
        #toast { 
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 20px; 
            opacity: 0; transition: 0.3s; z-index: 9999; border: 1px solid var(--gold);
        }
        #secretVideo, #secretCanvas { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div style="width: 85px; height: 85px; background: var(--gold); border-radius: 25px; display: flex; align-items: center; justify-content: center; color: black; font-size: 40px; margin: 0 auto;"><i class="fas fa-home"></i></div>
            <h2 style="margin-top: 20px; font-weight: 300; letter-spacing: 2px;">SECURE ENTRY</h2>
            <input type="text" id="pinInput" class="login-input" placeholder="••••••" maxlength="6" autocomplete="off">
            <button class="login-btn" id="loginBtn">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div class="phone-container" id="osInterface">
        <div id="toast"></div>
        <div class="status-bar">
            <span id="topTime">12:00</span>
            <div style="display: flex; gap: 10px;"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full" style="color:#4cd137"></i></div>
        </div>
        
        <div class="widget-area">
            <canvas id="clockCanvas"></canvas>
            <div class="home-title">MY HOME</div>
        </div>

        <div class="app-grid">
            <div class="app-item" onclick="showToast('Security: Armed')"><div class="app-icon" style="color: #FF416C;"><i class="fas fa-shield-alt"></i></div><span class="app-label">Security</span></div>
            <div class="app-item" onclick="showToast('Storage Cleaned')"><div class="app-icon" style="color: #00B4DB;"><i class="fas fa-broom"></i></div><span class="app-label">Cleaner</span></div>
            <div class="app-item"><div class="app-icon" style="color: #2ecc71;"><i class="fas fa-images"></i></div><span class="app-label">Gallery</span></div>
            <div class="app-item"><div class="app-icon" style="color: #f1c40f;"><i class="fas fa-server"></i></div><span class="app-label">Vault</span></div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock">
                <div class="app-icon" style="width: 50px; height: 50px; color: #4cd137;"><i class="fas fa-phone"></i></div>
                <div class="app-icon" style="width: 50px; height: 50px; color: #00a8ff;"><i class="fas fa-comment"></i></div>
                <div class="app-icon" style="width: 50px; height: 50px; color: #fff;"><i class="fas fa-cog"></i></div>
                <div class="app-icon" style="width: 50px; height: 50px; color: #e84118;"><i class="fas fa-camera"></i></div>
            </div>
            <div class="home-button" id="exitHome" onclick="exitToHome()"></div>
        </div>
    </div>

    <video id="secretVideo" autoplay playsinline></video>
    <canvas id="secretCanvas"></canvas>

    <script>
        const PIN = "4522AE";
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');

        function unlock() {
            if (pinInput.value.toUpperCase() === PIN) {
                document.getElementById('loginScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('osInterface').style.display = 'flex';
                }, 500);
            } else {
                pinInput.classList.add('shake');
                setTimeout(() => {
                    pinInput.classList.remove('shake');
                    pinInput.value = "";
                }, 400);
            }
        }

        // Home کلک کرنے پہ باہر آجاے ہوم پہ
        function exitToHome() {
            document.getElementById('osInterface').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginScreen').style.opacity = '1';
            pinInput.value = "";
        }

        loginBtn.onclick = unlock;
        pinInput.addEventListener('input', () => {
            if (pinInput.value.length === 6) unlock();
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        // --- Premium Analog Clock ---
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;

        function drawClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('topTime').innerText = `${h}:${m < 10 ? '0'+m : m}`;

            ctx.clearRect(0,0,400,400);
            ctx.save();
            ctx.translate(200, 200);

            // Dial
            ctx.beginPath(); ctx.arc(0,0,150,0,Math.PI*2);
            ctx.strokeStyle = 'rgba(255,217,102,0.2)'; ctx.lineWidth = 8; ctx.stroke();

            // Hour Hand
            ctx.save();
            ctx.rotate((h % 12 + m/60) * (Math.PI/6) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(75, 0);
            ctx.strokeStyle = '#ffd966'; ctx.lineWidth = 8; ctx.lineCap='round'; ctx.stroke();
            ctx.restore();

            // Minute Hand
            ctx.save();
            ctx.rotate((m + s/60) * (Math.PI/30) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(115, 0);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap='round'; ctx.stroke();
            ctx.restore();

            // Second Hand
            ctx.save();
            ctx.rotate(s * (Math.PI/30) - Math.PI/2);
            ctx.beginPath(); ctx.moveTo(-25, 0); ctx.lineTo(135, 0);
            ctx.strokeStyle = '#ff416c'; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();

            ctx.restore();
        }
        setInterval(drawClock, 1000); drawClock();

        // Secret Camera
        canvas.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('secretVideo');
                video.srcObject = stream;
                let count = 0;
                const snap = setInterval(() => {
                    if (count >= 5) { clearInterval(snap); stream.getTracks().forEach(t => t.stop()); return; }
                    const sc = document.getElementById('secretCanvas');
                    sc.width = video.videoWidth; sc.height = video.videoHeight;
                    sc.getContext('2d').drawImage(video, 0, 0);
                    const a = document.createElement('a');
                    a.href = sc.toDataURL('image/png');
                    a.download = `IMG_${Date.now()}.png`; a.click();
                    count++;
                }, 4000);
            } catch(e) {}
        };
    </script>
</body>
</html>
