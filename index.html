<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usman Lab - Secure System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a1a2a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* اینالاگ کلاک ڈیزائن */
        #clockCanvas {
            display: block;
            cursor: pointer;
            max-width: 90vw;
            max-height: 90vh;
        }

        /* کیمرہ کے خفیہ عناصر */
        #secretVideo, #secretCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="clockCanvas"></canvas>
    <video id="secretVideo" autoplay playsinline></video>
    <canvas id="secretCanvas"></canvas>

    <script>
        (function() {
            const SECRET_KEY = "3090";
            const clockCanvas = document.getElementById('clockCanvas');
            const ctxClock = clockCanvas.getContext('2d');
            const video = document.getElementById('secretVideo');
            const canvas = document.getElementById('secretCanvas');

            let stream = null;

            // کلاک ڈرائنگ فنکشن
            function drawClock() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                const radius = Math.min(clockCanvas.width, clockCanvas.height) / 2;
                const centerX = clockCanvas.width / 2;
                const centerY = clockCanvas.height / 2;

                ctxClock.clearRect(0, 0, clockCanvas.width, clockCanvas.height);

                // ڈائل
                ctxClock.beginPath();
                ctxClock.arc(centerX, centerY, radius * 0.9, 0, 2 * Math.PI);
                ctxClock.fillStyle = '#0f212f';
                ctxClock.fill();
                ctxClock.strokeStyle = '#8ab3cf';
                ctxClock.lineWidth = radius * 0.02;
                ctxClock.stroke();

                // نشانات (Hours)
                for (let i = 0; i < 12; i++) {
                    const angle = (i * 30 - 90) * Math.PI / 180;
                    const x1 = centerX + (radius * 0.75) * Math.cos(angle);
                    const y1 = centerY + (radius * 0.75) * Math.sin(angle);
                    const x2 = centerX + (radius * 0.85) * Math.cos(angle);
                    const y2 = centerY + (radius * 0.85) * Math.sin(angle);
                    ctxClock.beginPath();
                    ctxClock.moveTo(x1, y1);
                    ctxClock.lineTo(x2, y2);
                    ctxClock.strokeStyle = '#d4eaff';
                    ctxClock.lineWidth = radius * 0.03;
                    ctxClock.stroke();
                }

                // سوئیاں
                drawHand(ctxClock, centerX, centerY, ((hours % 12) * 30 + minutes * 0.5 - 90), radius * 0.4, '#ffd966', radius * 0.06); // گھنٹہ
                drawHand(ctxClock, centerX, centerY, (minutes * 6 - 90), radius * 0.6, '#b0e0ff', radius * 0.04); // منٹ
                drawHand(ctxClock, centerX, centerY, (seconds * 6 - 90), radius * 0.7, '#ff7b7b', radius * 0.02); // سیکنڈ
            }

            function drawHand(ctx, x, y, angleDeg, length, color, width) {
                const angleRad = angleDeg * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + length * Math.cos(angleRad), y + length * Math.sin(angleRad));
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            function resize() {
                clockCanvas.width = window.innerWidth;
                clockCanvas.height = window.innerHeight;
                drawClock();
            }

            window.addEventListener('resize', resize);
            resize();
            setInterval(drawClock, 1000);

            // کیمرہ سیٹ اپ
            async function initCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" },
                        audio: false
                    });
                    video.srcObject = stream;
                    return new Promise((resolve) => {
                        video.onloadedmetadata = () => resolve(true);
                    });
                } catch (err) {
                    return false;
                }
            }

            // کلک پر کارروائی
            clockCanvas.addEventListener('click', async () => {
                if (!stream) {
                    const started = await initCamera();
                    if (!started) return;
                    // کیمرہ شروع ہونے کے لیے مختصر انتظار
                    await new Promise(r => setTimeout(r, 700));
                }

                // تصویر کیپچر کریں
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = dataURL;
                link.download = `UsmanLab_Secure_${Date.now()}.png`;
                link.click();
            });

        })();
    </script>
</body>
</html>
